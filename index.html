<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=/touchpilot/">
  <title>ScratchWell</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fa;
      --text: #111827;
      --muted: #5f6673;
      --accent: #0a84ff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0d10;
        --text: #f4f5f7;
        --muted: #a4abb7;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(560px, calc(100% - 32px));
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(36px, 8vw, 56px);
      letter-spacing: -0.05em;
    }

    p {
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>ScratchWell</h1>
    <p>Redirecting to <a href="/touchpilot/">TouchPilot Support</a>.</p>
  </main>
</body>
</html>
